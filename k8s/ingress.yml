apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todolist-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: alpinepass.89.145.167.242.nip.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: alpinepass-backend-service
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alpinepass-frontend-service
                port:
                  number: 80